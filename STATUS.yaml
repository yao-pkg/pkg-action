# ─── Runtime dependencies ────────────────────────────────────────────────
# Every runtime dep must be justified — cap 6 (plan §16).

runtime-deps:
  '@actions/core':
    version: ^3.0.0
    purpose: runner protocol (inputs, outputs, secrets, annotations, state).
  '@actions/exec':
    version: ^3.0.0
    purpose: process spawning with GH log streaming.
  resedit:
    version: ^3.0.2
    purpose: Windows PE resource editing (pulls pe-library@^2.0.1 transitively).
  yazl:
    version: ^3.3.1
    purpose: cross-platform deterministic zip writer.

dev-deps:
  typescript:
    version: 5.9.3
    notes: pinned — must stay compatible with Node 22.22.1 bundled amaro strip-types parser.
  esbuild: { version: ^0.28.0 }
  eslint:
    version: ^9.39.4
    notes: holding at v9.x until flat-config verified on v10.
  '@typescript-eslint/eslint-plugin': { version: ^8.58.2 }
  '@typescript-eslint/parser': { version: ^8.58.2 }
  eslint-config-prettier: { version: ^10.1.8 }
  eslint-plugin-prettier: { version: ^5.5.5 }
  prettier: { version: ^3.8.3 }
  globals: { version: ^17.5.0 }
  '@types/node':
    version: ^22.19.17
    notes: pinned to @22 to match runtime — NOT @25 (would surface APIs we cannot use).
  '@types/yazl': { version: ^3.3.1 }

gh-actions:
  actions/checkout: v6
  actions/setup-node: v6
  actions/cache: v5
  github/codeql-action: v4

known-issues:
  - 'yarn install pulls transitive bare-os/bare-fs emitting invalid-engine warnings — cosmetic.'
