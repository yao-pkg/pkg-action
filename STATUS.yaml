# pkg-action implementation status tracker.
#
# Transient file kept in-repo while v1.0.0 is under construction. Will be
# removed (or converted into a changelog + badge) once we ship. Updated on
# every code-landing commit — treat a stale entry here as a bug.
#
# Scope reference: yao-pkg/pkg#248 and the plan comment on that issue.

meta:
  repo: yao-pkg/pkg-action
  branch: main
  last-updated: '2026-04-20'
  action-status: PRE-ALPHA — do not consume from a workflow
  ci-status: green
  e2e-status: green on ubuntu-latest / macos-latest / windows-latest (tiny-app-cjs: tar.gz + zip + sha256 sidecar round-trip verified); matrix plan→fanout job added — awaits first CI run

milestones:
  M-1:
    title: Pre-flight spikes
    status: partial
    done:
      - 'runs.using:node24 green on ubuntu-latest / macos-latest / windows-latest'
      - '--experimental-strip-types + esbuild bundling proven on Node 22.22.1 and 24.x'
    pending:
      - self-hosted runner verification for node24
      - GHES node24 verification (out of reach without a GHES instance)
      - 't.mock.module vs DI-double decision (resolved — DI-style test doubles, used everywhere)'

  M0:
    title: Scaffold
    status: done

  M1:
    title: Core build path
    status: done
    sub-chunks:
      '1.1 foundation (errors / logger / fs-utils)': done
      '1.2 domain (targets / templates)': done
      '1.3 checksum': done
      '1.4 inputs validator + metadata': done
      '1.5 pkg-runner + pkg-output-map': done
      '1.6 archive + summary': done
      '1.7 uploader + project-info': done
      '1.8 orchestrator (packages/build/src/main.ts)': done
      '1.9 scripts/gen-action-yml.ts codegen': done
      '1.10 real root composite action.yml': done (generated from inputs.ts)
      '1.11 e2e.yml + test-fixtures/tiny-app-{cjs,esm}': done (awaiting first CI run)
    tests:
      unit: '145 tests green locally on Node 22.22.1'
      integration: 'e2e.yml added — awaits first CI run to prove the full composite pipeline'
      coverage-gate: 'not yet enforced in CI (planned for M5)'

  M2:
    title: Matrix sub-action + multi-target
    status: done
    depends-on: M1
    sub-chunks:
      '2.1 matrix main.ts (parseTargetList → expandMatrix, runner-overrides, cross-compile warnings)': done
      '2.2 matrix unit tests (DI-style doubles, 19 tests)': done
      '2.3 matrix bundle (packages/matrix/dist/index.mjs with createRequire banner)': done
      '2.4 matrix-plan → matrix-fanout e2e job (strategy.matrix consumption demo)': done (awaits first CI run)
      '2.5 multi-target single-runner build path (pkg invoked with >1 target in-process)': done (single-runner two-target e2e added; buildPkgArgs/mapPkgOutputs already cover the case with 145 unit tests)
      '2.6 docs — docs/matrix.md + README snippet': done
    tests:
      unit: '164 tests green locally on Node 22.22.1 (19 new in packages/matrix/test/unit)'

  M3:
    title: Windows metadata (resedit)
    status: in-progress
    depends-on: M1
    sub-chunks:
      '3.1 @pkg-action/core windows-metadata module (pure helpers — input parsing, version-padding, icon-spec parser, metadata JSON merge)': done (31 unit tests, 195 total green)
      '3.2 resedit integration (applyWindowsMetadata — read .exe, patch icon/version-info/manifest, write .exe)': pending
      '3.3 windows-metadata sub-action main.ts + bundle': pending
      '3.4 unit tests (DI-style, no real resedit calls) + fixture-based integration test': pending
      '3.5 orchestrator wire-up (composite main.ts invokes windows-metadata on win-* targets when any windows-* input set)': pending
      '3.6 e2e smoke (patch tiny-app-cjs windows binary, re-parse resources to verify)': pending

  M4:
    title: Signing & notarization
    status: pending
    depends-on: M1

  M5:
    title: Release attach + step-summary polish + docs + dependabot-bundle.yml
    status: pending
    depends-on: M1,M4

  M6:
    title: 'Stretch: SBOM / provenance / Docker / Homebrew / Scoop'
    status: pending
    depends-on: M5

runtime-deps:
  # Every runtime dep must be justified (see plan §16 budget — cap 6).
  '@actions/core':
    version: ^3.0.0
    purpose: runner protocol (inputs, outputs, secrets, annotations, state)
  '@actions/exec':
    version: ^3.0.0
    purpose: process spawning with GH log streaming
  '@actions/artifact':
    version: ^6.2.1
    purpose: workflow artifact upload (internal endpoint; cannot reimplement)
  '@actions/github':
    version: ^9.1.0
    purpose: Octokit for release attach
  resedit:
    version: ^3.0.2
    purpose: Windows PE resource editing (M3) — pulls pe-library@^2.0.1 transitively
  yazl:
    version: ^3.3.1
    purpose: cross-platform deterministic zip writer

dev-deps:
  typescript:
    version: 5.9.3
    notes: pinned, not "latest" — must stay compatible with Node 22.22.1 bundled amaro (strip-types parser).
  esbuild:
    version: ^0.28.0
  eslint:
    version: ^9.39.4
    notes: holding at v9.x until flat-config is verified on v10.
  '@typescript-eslint/eslint-plugin':
    version: ^8.58.2
  '@typescript-eslint/parser':
    version: ^8.58.2
  'eslint-config-prettier':
    version: ^10.1.8
  'eslint-plugin-prettier':
    version: ^5.5.5
  prettier:
    version: ^3.8.3
  globals:
    version: ^17.5.0
  '@types/node':
    version: ^22.19.17
    notes: pinned to @22 to match Node runtime — NOT @25 (would surface APIs we cannot use).
  '@types/yazl':
    version: ^3.3.1

gh-actions:
  actions/checkout: v6
  actions/setup-node: v6
  actions/cache: v5                          # (used inside composite action.yml)
  github/codeql-action: v4
  # Pulled in later milestones:
  # actions/upload-artifact: v7
  # actions/attest-build-provenance: v4

known-issues:
  - '`@actions/artifact` v6 uses a new client shape — `createDefaultArtifactUploader` uses dynamic import + lazy access, so the tests never load it.'
  - 'yarn install pulls transitive `bare-os`/`bare-fs` which emit invalid-engine warnings — cosmetic, tracked.'
  - 'esbuild ESM bundles need a createRequire banner to let bundled CJS deps (@actions/http-client + tunnel) require(node:<builtin>) at runtime — FIXED in 757a329.'
  - 'Orchestrator must resolve a project-dir separately from GITHUB_WORKSPACE when config points at a package.json — FIXED: derives projectDir = dirname(config) in that case and invokes pkg with cwd: projectDir.'

next:
  - M3.1 — install resedit (^2.0.5) and author packages/core/src/windows-metadata.ts with the pure helpers (parseIconSpec, padVersion, mergeMetadataFile, parseWindowsMetadataInputs). Unit tests at the same time.
  - M3.2 — applyWindowsMetadata(inputPath, outputPath, meta) using resedit's NtExecutable + NtExecutableResource + VersionInfo APIs. Keep the I/O behind a DI-able fs shim so unit tests can stay pure.
  - M3.3 / M3.4 — wire packages/windows-metadata/src/main.ts, bundle, add fixture-based integration test.
  - M3.5 — have the build orchestrator call applyWindowsMetadata directly (not the sub-action shell) when a windows-* input is set and at least one target is win-*.
  - M3.6 — e2e smoke: run the Windows leg with product-name + company-name, pkg the binary, then use resedit to read the resource tree back and assert.
  - Add the ESM fixture (tiny-app-esm with mode: sea) to the e2e matrix once @yao-pkg/pkg's SEA path is smoke-tested via the action.
  - Wire in the integration-test shard (archive tar/7z round-trip against system tools) — deferred from M1.3.
