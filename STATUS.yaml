# pkg-action implementation status tracker.
#
# In-repo while v1.0.0 is under construction. Deleted (or replaced by a
# CHANGELOG + badge) once we ship. Updated on every code-landing commit —
# a stale entry here is a bug.
#
# Scope reference: yao-pkg/pkg#248 and the plan comment on that issue.
# Architecture reference: docs/architecture.md.

meta:
  repo: yao-pkg/pkg-action
  branch: main
  last-updated: '2026-04-23'
  action-status: ALPHA — ready for early adopters to try in their own workflows
  ci-status: green (222 unit tests)
  e2e-status: |
    6 jobs after the scope cut — tiny-cjs (ubuntu/macos/windows), codegen-drift,
    matrix plan→fanout, multi-target-linux, windows-metadata. Signing e2e still
    deferred until live credentials are available.

# ─── Scope decision (2026-04-23) ─────────────────────────────────────────
#
# The action does ONE thing: build a pkg binary, optionally patch Windows
# PE resources, optionally sign, optionally archive, always checksum.
# Emits file paths via step outputs. That's the whole contract.
#
# Distribution concerns (release attach, Docker, Homebrew, Scoop, SBOM,
# SLSA provenance, workflow artifact upload) are out of scope. Users chain
# dedicated first-party actions against the outputs. See README "After the
# build" and docs/architecture.md §2.

# ─── Shipped ─────────────────────────────────────────────────────────────
# One-line summaries. Sub-chunk detail has moved to commit history + tests.

shipped:
  M-1 spikes: runs.using:node24 verified on hosted runners; strip-types + esbuild pipeline proven.
  M0 scaffold: monorepo, yarn workspaces, .node-version, tsconfig, eslint/prettier.
  M1 core build path: inputs/targets/templates/checksum/pkg-runner/archive/orchestrator; codegen'd action.yml; tiny-app-{cjs,esm} fixtures.
  M2 matrix sub-action: parseTargetList → expandMatrix, native-runner pinning, cross-compile warnings; matrix-plan→fanout e2e job.
  M3 windows metadata: resedit integration; icon/version-info/manifest patching; e2e asserts round-trip via pe-library.
  M4 signing & notarization: macOS codesign + notarytool, Windows signtool, Azure Trusted Signing — all behind ExecFn DI; secret-never-in-argv invariant.

# ─── Architectural hardening (shipped 2026-04-23 on PR #9) ───────────────

recent-hardening:
  - 'E2E workflow pull_request trigger path-filtered so docs-only PRs do not burn CI minutes (S12).'
  - 'VERSION export driven by root package.json via esbuild `define`; runtime fallback reads the file in dev (S1).'
  - '`yamlString` codegen helper throws on embedded control chars — prevents silent action.yml corruption (S2).'
  - 'CI coverage gate at 85% via scripts/check-coverage.ts parsing lcov (S6).'

# ─── Input-surface slim (2026-04-23) ─────────────────────────────────────
# Stop mirroring pkg's CLI. Pkg-specific knobs live in the user's pkg config;
# the action owns only concerns pkg config cannot express (CI-matrix targets,
# pkg install version, archive, checksum, windows-metadata, signing, cache).

input-surface-slim:
  dropped-inputs:
    - mode
    - node-version
    - compress-node
    - fallback-to-source
    - public
    - public-packages
    - options
    - no-bytecode
    - no-dict
    - debug
    - extra-args
  migration: 'Move each value into .pkgrc / pkg.config.{js,ts,json} or the `pkg` field of package.json. `buildPkgArgs` forwards the config path to pkg.'
  breaking: 'yes — users setting any dropped input will see the unknown-input warning and the value will be ignored. Release note required.'
  upstream-dependency: |
    @yao-pkg/pkg currently accepts only a subset of build flags in its config
    file (scripts, assets, ignore, targets, outputPath, patches, sea,
    seaConfig, deployAssets). The rest (--compress, --fallback-to-source,
    --public, --public-packages, --options, --no-bytecode, --no-dict,
    --debug, --signature) are CLI-only. Until pkg lands config support for
    those, users of this action lose access to them.
    Tracking upstream: https://github.com/yao-pkg/pkg/issues/262.
  known-gaps:
    - 'Zstd bundled-binary compression — unreachable without the --compress CLI flag. The claude-code-smoke e2e job exercises SEA + tar.gz only until upstream lands pkg-config `compress` support.'

# ─── Removed (2026-04-23) ────────────────────────────────────────────────
# Distribution scope reset. Use dedicated downstream actions instead.

removed:
  M5 release attach + release body templating:
    what: 'attach-to-release, release-{tag,name,body,draft,prerelease}, generate-release-table inputs + ReleaseAttacher + buildReleaseBody + step-summary Release trailer.'
    replacement: 'softprops/action-gh-release against steps.<id>.outputs.artifacts + outputs.checksums.'
  M6.1 SLSA provenance:
    what: 'provenance input + attest-build-provenance wiring in composite action.yml.'
    replacement: 'actions/attest-build-provenance@v4 — one step chained after pkg-action.'
  M6.2 SBOM:
    what: 'sbom input + packages/core/src/sbom.ts (CycloneDX 1.5 + SPDX 2.3).'
    replacement: 'anchore/sbom-action (Syft) against the produced binaries.'
  M6.3 Docker OCI publish:
    what: 'docker-* inputs + packages/core/src/docker.ts (multi-arch buildx + push + manifest list).'
    replacement: 'docker/build-push-action against a hand-authored Dockerfile that COPYs the binary path from steps.<id>.outputs.binaries.'
  M6.4 Homebrew tap PR:
    what: 'homebrew-* inputs + renderHomebrewFormula + Octokit-backed DistributionPublisher.'
    replacement: 'dedicated tap-updater actions (e.g. dawidd6/action-homebrew-bump-formula).'
  M6.5 Scoop manifest PR:
    what: 'scoop-* inputs + renderScoopManifest.'
    replacement: 'dedicated bucket-updater actions.'
  Workflow artifact upload:
    what: 'upload-artifact + artifact-name inputs + @actions/artifact integration.'
    replacement: 'actions/upload-artifact@v4 with path set from steps.<id>.outputs.artifacts.'

