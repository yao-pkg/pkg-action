# pkg-action implementation status tracker.
#
# In-repo while v1.0.0 is under construction. Deleted (or replaced by a
# CHANGELOG + badge) once we ship. Updated on every code-landing commit —
# a stale entry here is a bug.
#
# Scope reference: yao-pkg/pkg#248 and the plan comment on that issue.
# Architecture reference: docs/architecture.md.

meta:
  repo: yao-pkg/pkg-action
  branch: main
  last-updated: '2026-04-23'
  action-status: ALPHA — ready for early adopters to try in their own workflows
  ci-status: green (296 unit tests, 94.87% line coverage, gate 85%)
  e2e-status: |
    green on ubuntu/macos/windows — 15 jobs pass (run 24820663378, 2026-04-23).
    Covers: tiny-app-cjs round-trip (tar.gz + zip + sha256), matrix plan→fanout,
    multi-target-linux, windows-metadata, provenance (attest + verify),
    sbom (cyclonedx + spdx), docker (ghcr.io push + pull + run).
    Deferred until live credentials: signing, homebrew tap, scoop bucket.

# ─── Shipped ─────────────────────────────────────────────────────────────
# One-line summaries. Sub-chunk detail has moved to commit history + tests.

shipped:
  M-1 spikes: runs.using:node24 verified on hosted runners; strip-types + esbuild pipeline proven.
  M0 scaffold: monorepo, yarn workspaces, .node-version, tsconfig, eslint/prettier.
  M1 core build path: inputs/targets/templates/checksum/pkg-runner/archive/uploader/orchestrator; codegen'd action.yml; tiny-app-{cjs,esm} fixtures.
  M2 matrix sub-action: parseTargetList → expandMatrix, native-runner pinning, cross-compile warnings; matrix-plan→fanout e2e job.
  M3 windows metadata: resedit integration; icon/version-info/manifest patching; e2e asserts round-trip via pe-library.
  M4 signing & notarization: macOS codesign + notarytool, Windows signtool, Azure Trusted Signing — all behind ExecFn DI; secret-never-in-argv invariant.
  M5 release attach + docs: ReleaseAttacher; buildReleaseBody; step-summary Signed column + Release trailer; dependabot grouped updates.
  M6 stretch: provenance (attest-build-provenance@v4), SBOM (CycloneDX 1.5 + SPDX 2.3), Docker (multi-arch manifest, ghcr.io e2e green), Homebrew tap PR, Scoop manifest PR.

# ─── Architectural hardening (shipped 2026-04-23) ─────────────────────────

recent-hardening:
  - 'Dynamic `await import("@pkg-action/core")` in orchestrator replaced with static named import (S4).'
  - 'E2E workflow pull_request trigger now path-filtered so docs-only PRs do not burn CI minutes (S12).'
  - 'VERSION export driven by root package.json via esbuild `define`; runtime fallback reads the file in dev (S1).'
  - '`yamlString` codegen helper now throws on embedded control chars — prevents silent action.yml corruption (S2).'
  - 'CI coverage gate at 85% via scripts/check-coverage.ts parsing lcov (S6).'
  - '`createDefaultDistributionPublisher` now takes `{ token }` deps object — shape symmetrical with createDefaultDockerPublisher (S11).'

# ─── Pending ─────────────────────────────────────────────────────────────

pending:
  architecture:
    orchestrator-refactor:
      issue: packages/build/src/main.ts is ~780 lines, mixing wiring with transforms.
      plan: |
        Extract into @pkg-action/core:
          - finalizeBinary(out, ctx, deps) — rename → windows-metadata → sign → archive → checksum.
          - createActionsExecBridge() — current inline execBridge (88-112) becomes testable.
          - publishers.ts — publishHomebrew / publishScoop / publishDocker helpers.
        Target: main.ts collapses to ~280 lines of wiring + error boundary.
      size: 4-6 hours, dedicated PR.

    subpath-exports:
      issue: '@pkg-action/core barrel re-exports everything; unit tests pay unused transitive cost.'
      plan: 'Add `"./signing"`, `"./distribution"`, `"./docker"`, `"./sbom"` subpath exports in packages/core/package.json.'
      size: 1 hour. Cosmetic unless test startup measured slow.

  e2e-coverage:
    - Add `test-fixtures/tiny-app-ts/` — TypeScript source + tsconfig to exercise pkg TS path.
    - Add `test-fixtures/tiny-app-assets/` — pkg.assets glob + runtime read from SEA snapshot.
    - Add `test-fixtures/tiny-app-bin-override/` — package.json#bin drives output name.
    - Wire self-signed certificate e2e for signing — ad-hoc codesign on macOS, New-SelfSignedCertificate on Windows. Exercises argv shape without real Developer ID.

  live-credential-e2e:
    - Homebrew tap — disposable tap repo under the org + short-lived PAT.
    - Scoop bucket — disposable bucket repo under the org + short-lived PAT.
    - Real signing — macOS Developer ID cert, Apple notarization creds, Windows code-signing cert.
    Blocked on: organization decision about test-infra repos and secret provisioning.

  release-readiness:
    - Bump root `package.json#version` to 1.0.0 at tag time — auto-propagates via esbuild define into every bundled sub-action.
    - Write CHANGELOG.md covering M0 → M6 from git history.
    - Self-hosted runner smoke for node24 (carried over from M-1).
    - GHES verification (out of reach without a GHES instance).

# ─── Runtime dependencies ────────────────────────────────────────────────
# Every runtime dep must be justified — cap 6 (plan §16).

runtime-deps:
  '@actions/core':
    version: ^3.0.0
    purpose: runner protocol (inputs, outputs, secrets, annotations, state).
  '@actions/exec':
    version: ^3.0.0
    purpose: process spawning with GH log streaming.
  '@actions/artifact':
    version: ^6.2.1
    purpose: workflow artifact upload (internal endpoint, cannot reimplement).
  '@actions/github':
    version: ^9.1.0
    purpose: Octokit for release attach + Homebrew/Scoop PR creation.
  resedit:
    version: ^3.0.2
    purpose: Windows PE resource editing (pulls pe-library@^2.0.1 transitively).
  yazl:
    version: ^3.3.1
    purpose: cross-platform deterministic zip writer.

dev-deps:
  typescript:
    version: 5.9.3
    notes: pinned — must stay compatible with Node 22.22.1 bundled amaro strip-types parser.
  esbuild: { version: ^0.28.0 }
  eslint:
    version: ^9.39.4
    notes: holding at v9.x until flat-config verified on v10.
  '@typescript-eslint/eslint-plugin': { version: ^8.58.2 }
  '@typescript-eslint/parser': { version: ^8.58.2 }
  eslint-config-prettier: { version: ^10.1.8 }
  eslint-plugin-prettier: { version: ^5.5.5 }
  prettier: { version: ^3.8.3 }
  globals: { version: ^17.5.0 }
  '@types/node':
    version: ^22.19.17
    notes: pinned to @22 to match runtime — NOT @25 (would surface APIs we cannot use).
  '@types/yazl': { version: ^3.3.1 }

gh-actions:
  actions/checkout: v6
  actions/setup-node: v6
  actions/cache: v5
  actions/attest-build-provenance: v4
  github/codeql-action: v4

known-issues:
  - '@actions/artifact v6 client loaded via dynamic import + lazy access so tests never pull it.'
  - 'yarn install pulls transitive bare-os/bare-fs emitting invalid-engine warnings — cosmetic.'
