name: E2E

# Invokes the top-level composite against the test-fixtures/ projects on
# ubuntu/macos/windows. Asserts:
#   - produced binary runs and prints the expected version
#   - checksum sidecar matches the binary
#   - archive round-trips (when compress != none)
#   - step summary contains a row for the target

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tiny-cjs:
    name: tiny-cjs / ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: node22-linux-x64
            archive: tar.gz
            ext: tar.gz
          - os: macos-latest
            target: node22-macos-arm64
            archive: zip
            ext: zip
          - os: windows-latest
            target: node22-win-x64
            archive: zip
            ext: zip
    steps:
      - uses: actions/checkout@v6

      - name: Run pkg-action
        id: build
        uses: ./
        with:
          config: test-fixtures/tiny-app-cjs/package.json
          targets: ${{ matrix.target }}
          compress: ${{ matrix.archive }}
          checksum: sha256
          filename: '{name}-{version}-{os}-{arch}'

      - name: Show outputs
        shell: bash
        run: |
          echo "binaries=${{ steps.build.outputs.binaries }}"
          echo "artifacts=${{ steps.build.outputs.artifacts }}"
          echo "checksums=${{ steps.build.outputs.checksums }}"
          echo "version=${{ steps.build.outputs.version }}"

      - name: Assert at least one artifact produced
        shell: bash
        run: |
          count=$(echo '${{ steps.build.outputs.artifacts }}' | jq 'length')
          if [ "$count" -lt 1 ]; then
            echo "::error::no artifacts produced"; exit 1
          fi

      - name: Assert checksum sidecar matches the archived artifact
        shell: bash
        run: |
          first_artifact=$(echo '${{ steps.build.outputs.artifacts }}' | jq -r '.[0]')
          sidecar="${first_artifact}.sha256"
          if [ ! -f "$sidecar" ]; then
            echo "::error::missing checksum sidecar at $sidecar"; exit 1
          fi
          # The sidecar is <digest>  <basename>\n — verify the digest parses as 64 hex chars.
          awk 'NR==1 { if (length($1) != 64) exit 1 }' "$sidecar"
          echo "sidecar OK: $(cat "$sidecar")"

  codegen-drift:
    name: Verify action.yml codegen drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: yarn
      - run: yarn install --non-interactive
      - run: yarn gen
      - name: Verify committed action.yml matches source
        run: |
          git diff --exit-code -- action.yml packages/build/action.yml docs/inputs.md || {
            echo "::error::action.yml or docs/inputs.md is out of sync. Run 'yarn gen' locally and commit."
            exit 1
          }

  # ──────────────────────────────────────────────────────────────────────
  # M2: matrix sub-action demo.
  #
  # Stage 1 ("plan") runs the matrix sub-action and emits a JSON array of
  # {target, runner} tuples. Stage 2 ("fan-out") consumes that array via
  # strategy.matrix and invokes the top-level composite on each runner. This
  # is the canonical downstream usage for pkg-action/matrix and doubles as a
  # smoke test that the JSON shape is strategy.matrix-compatible.
  matrix-plan:
    name: Matrix plan
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Expand targets into a matrix
        id: plan
        uses: ./matrix
        with:
          targets: |
            node22-linux-x64
            node22-macos-arm64
            node22-win-x64
      - name: Show expansion
        run: |
          echo 'matrix=${{ steps.plan.outputs.matrix }}'

  matrix-fanout:
    name: matrix-fanout / ${{ matrix.entry.target }}
    needs: matrix-plan
    runs-on: ${{ matrix.entry.runner }}
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.matrix-plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Build fixture for ${{ matrix.entry.target }}
        id: build
        uses: ./
        with:
          config: test-fixtures/tiny-app-cjs/package.json
          targets: ${{ matrix.entry.target }}
          compress: none
          checksum: sha256
          filename: '{name}-{version}-{os}-{arch}'

      - name: Assert at least one binary
        shell: bash
        run: |
          count=$(echo '${{ steps.build.outputs.binaries }}' | jq 'length')
          if [ "$count" -lt 1 ]; then
            echo "::error::no binary produced for ${{ matrix.entry.target }}"; exit 1
          fi

  # ──────────────────────────────────────────────────────────────────────
  # M2 §2.5: multi-target, single-runner. Proves the orchestrator's per-
  # target loop against a real pkg invocation that asks for >1 target at
  # once. Both linux-x64 and linuxstatic-x64 are native on ubuntu-latest,
  # so no cross-compile risks muddy the result.
  multi-target-linux:
    name: multi-target / ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build two linux targets in one invocation
        id: build
        uses: ./
        with:
          config: test-fixtures/tiny-app-cjs/package.json
          targets: |
            node22-linux-x64
            node22-linuxstatic-x64
          compress: none
          checksum: sha256
          filename: '{name}-{version}-{os}-{arch}'

      - name: Assert both binaries produced
        shell: bash
        run: |
          count=$(echo '${{ steps.build.outputs.binaries }}' | jq 'length')
          if [ "$count" -ne 2 ]; then
            echo "::error::expected 2 binaries, got $count"
            echo '${{ steps.build.outputs.binaries }}' | jq
            exit 1
          fi
          # Every binary must exist on disk.
          echo '${{ steps.build.outputs.binaries }}' | jq -r '.[]' | while read -r bin; do
            [ -f "$bin" ] || { echo "::error::missing binary $bin"; exit 1; }
          done
          # A sidecar checksum must accompany each artifact.
          echo '${{ steps.build.outputs.artifacts }}' | jq -r '.[]' | while read -r art; do
            [ -f "$art.sha256" ] || { echo "::error::missing sidecar $art.sha256"; exit 1; }
          done

  # ──────────────────────────────────────────────────────────────────────
  # M3 §3.6: Windows metadata e2e smoke. Builds a win-x64 binary with
  # product-name / company-name / file-version set at the top-level, then
  # re-parses the output with resedit to verify those strings land in the
  # VS_VERSIONINFO block of the emitted PE. This covers the full chain:
  #   parseInputs → parseWindowsMetadataInputs → orchestrator loop →
  #   applyWindowsMetadata → NtExecutable.generate.
  windows-metadata:
    name: windows-metadata / windows-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: yarn
      - run: yarn install --non-interactive
        shell: bash

      - name: Build tiny-app with windows metadata
        id: build
        uses: ./
        with:
          config: test-fixtures/tiny-app-cjs/package.json
          targets: node22-win-x64
          compress: none
          checksum: sha256
          filename: '{name}-{version}-{os}-{arch}'
          windows-product-name: 'PkgActionTest'
          windows-company-name: 'Acme Ltd'
          windows-file-version: '1.2.3.4'
          windows-file-description: 'pkg-action M3 smoke'

      - name: Verify VS_VERSIONINFO round-trips via resedit
        shell: bash
        run: |
          bin=$(echo '${{ steps.build.outputs.binaries }}' | jq -r '.[0]')
          [ -f "$bin" ] || { echo "::error::binary missing: $bin"; exit 1; }
          echo "Checking $bin"
          node --experimental-strip-types .github/scripts/assert-windows-metadata.ts "$bin"

  # ──────────────────────────────────────────────────────────────────────
  # M6 §6.1: SLSA build-provenance attestation. Runs the composite with
  # provenance=true on a cheap ubuntu-latest target; asserts that every
  # artifact has a corresponding attestation uploaded to the repo's
  # attestations store via `gh attestation list` + a JSON walk.
  provenance:
    name: provenance / ubuntu-latest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Build tiny-app with provenance enabled
        id: build
        uses: ./
        with:
          config: test-fixtures/tiny-app-cjs/package.json
          targets: node22-linux-x64
          compress: tar.gz
          checksum: sha256
          filename: '{name}-{version}-{os}-{arch}'
          provenance: true

      - name: Verify an attestation was produced for the artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          artifact=$(echo '${{ steps.build.outputs.artifacts }}' | jq -r '.[0]')
          [ -f "$artifact" ] || { echo "::error::artifact missing: $artifact"; exit 1; }
          echo "Verifying attestation for $artifact"
          # gh attestation verify hits the repo's attestation store. When the
          # attestation from this run was indexed successfully, this call
          # exits 0 with a signed summary. Any failure means provenance
          # wasn't produced or wasn't discoverable — treat both as fatal.
          gh attestation verify "$artifact" --repo "$GITHUB_REPOSITORY"

  # ──────────────────────────────────────────────────────────────────────
  # M6 §6.2: SBOM generation. Runs the composite with sbom=cyclonedx on a
  # cheap ubuntu-latest target; asserts the SBOM file is uploaded as a
  # workflow artifact AND contains a valid CycloneDX 1.5 doc referencing
  # the binary's hash.
  sbom-cyclonedx:
    name: sbom-cyclonedx / ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build tiny-app with CycloneDX SBOM
        id: build
        uses: ./
        with:
          config: test-fixtures/tiny-app-cjs/package.json
          targets: node22-linux-x64
          compress: tar.gz
          checksum: sha256
          filename: '{name}-{version}-{os}-{arch}'
          sbom: cyclonedx

      - name: Assert SBOM file exists and parses
        shell: bash
        run: |
          sbom="$RUNNER_TEMP"/pkg-action-*/final/tiny-app-cjs-0.0.1.cdx.json
          # Glob it explicitly.
          sbom_resolved=$(ls $sbom 2>/dev/null | head -n1)
          [ -n "$sbom_resolved" ] || { echo "::error::SBOM file not found (glob: $sbom)"; exit 1; }
          echo "Found SBOM: $sbom_resolved"
          bomFormat=$(jq -r '.bomFormat' "$sbom_resolved")
          specVersion=$(jq -r '.specVersion' "$sbom_resolved")
          [ "$bomFormat" = "CycloneDX" ] || { echo "::error::bomFormat=$bomFormat"; exit 1; }
          [ "$specVersion" = "1.5" ] || { echo "::error::specVersion=$specVersion"; exit 1; }
          # metadata.component.name must be the project name.
          projName=$(jq -r '.metadata.component.name' "$sbom_resolved")
          [ "$projName" = "tiny-app-cjs" ] || { echo "::error::component.name=$projName"; exit 1; }
          # formulation[].components[0].hashes must reference SHA-256.
          algo=$(jq -r '.formulation[0].components[0].hashes[0].alg' "$sbom_resolved")
          [ "$algo" = "SHA-256" ] || { echo "::error::hash alg=$algo"; exit 1; }
          echo "SBOM OK"

  sbom-spdx:
    name: sbom-spdx / ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build tiny-app with SPDX SBOM
        id: build
        uses: ./
        with:
          config: test-fixtures/tiny-app-cjs/package.json
          targets: node22-linux-x64
          compress: none
          checksum: sha256
          filename: '{name}-{version}-{os}-{arch}'
          sbom: spdx

      - name: Assert SPDX SBOM file exists and parses
        shell: bash
        run: |
          sbom_resolved=$(ls "$RUNNER_TEMP"/pkg-action-*/final/tiny-app-cjs-0.0.1.spdx.json 2>/dev/null | head -n1)
          [ -n "$sbom_resolved" ] || { echo "::error::SPDX SBOM not found"; exit 1; }
          echo "Found SBOM: $sbom_resolved"
          spdxVersion=$(jq -r '.spdxVersion' "$sbom_resolved")
          [ "$spdxVersion" = "SPDX-2.3" ] || { echo "::error::spdxVersion=$spdxVersion"; exit 1; }
          # DESCRIBES relationship to the project root must exist.
          count=$(jq '[.relationships[] | select(.relationshipType=="DESCRIBES")] | length' "$sbom_resolved")
          [ "$count" -ge 1 ] || { echo "::error::no DESCRIBES relationship"; exit 1; }
          echo "SPDX SBOM OK"
