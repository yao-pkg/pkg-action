name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: lint + test + build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - pinned # reads .node-version
          - 24
    steps:
      - uses: actions/checkout@v6

      - name: Resolve Node version
        id: node
        run: |
          if [ "${{ matrix.node }}" = "pinned" ]; then
            echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ matrix.node }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: yarn

      - name: Install
        run: yarn install --non-interactive

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests (with coverage)
        run: yarn test

      - name: Coverage gate
        run: node --experimental-strip-types scripts/check-coverage.ts coverage.lcov --min 85

      - name: Build (bundle dist/)
        run: yarn build

      - name: Codegen (action.yml + docs/inputs.md)
        run: yarn gen

      - name: Verify committed dist/ + action.yml + docs are up-to-date
        run: |
          git diff --exit-code -- '**/dist/**' action.yml packages/build/action.yml docs/inputs.md || {
            echo "::error::Committed dist/ or generated action.yml/inputs.md is out of sync. Run 'yarn build && yarn gen' locally and commit."
            exit 1
          }
