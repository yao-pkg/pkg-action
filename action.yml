name: 'yao-pkg/pkg-action'
description: 'Build, sign, archive, checksum, and publish Node.js binaries with @yao-pkg/pkg.'
author: 'yao-pkg contributors'
branding:
  icon: 'package'
  color: 'blue'

inputs:
  config:
    description: 'Path to a pkg config (.pkgrc, pkg.config.{js,ts,json}, or package.json). Auto-detected when omitted.'
  entry:
    description: 'Entry script when not specified in the config.'
  targets:
    description: 'Comma- or newline-separated pkg target triples, e.g. node22-linux-x64,node22-macos-arm64. Defaults to the host target.'
  mode:
    description: 'standard | sea — selects pkg Standard or SEA mode.'
    default: 'standard'
  node-version:
    description: 'pkg''s bundled Node.js major (e.g. 22, 24). Does not affect the action''s own Node runtime.'
    default: '22'
  compress-node:
    description: 'pkg''s bundled-binary compression: Brotli | GZip | None.'
    default: 'None'
  fallback-to-source:
    description: 'Pass pkg --fallback-to-source for bytecode-fabricator failures.'
    default: 'false'
  public:
    description: 'Pass pkg --public (ships sources as plaintext).'
    default: 'false'
  public-packages:
    description: 'Comma-separated package names to mark public (pkg --public-packages).'
  options:
    description: 'Comma-separated V8 options baked into the binary (pkg --options).'
  no-bytecode:
    description: 'Pass pkg --no-bytecode.'
    default: 'false'
  no-dict:
    description: 'Comma-separated list of packages for pkg --no-dict (or * for all).'
  debug:
    description: 'Pass pkg --debug.'
    default: 'false'
  extra-args:
    description: 'Raw extra flags appended to the pkg CLI invocation.'
  pkg-version:
    description: 'npm version specifier for @yao-pkg/pkg (e.g. ~6.16.0). Bypassed when pkg-path is set.'
    default: '~6.16.0'
  pkg-path:
    description: 'Absolute path to a pre-installed pkg binary. Skips the implicit npm i -g.'
  strip:
    description: 'Strip debug symbols on Linux/macOS outputs.'
    default: 'false'
  compress:
    description: 'Archive format: tar.gz | tar.xz | zip | 7z | none.'
    default: 'none'
  filename:
    description: 'Output filename template. Tokens: {name} {version} {target} {node} {os} {arch} {sha} {ref} {date} {tag}.'
    default: '{name}-{version}-{os}-{arch}'
  checksum:
    description: 'Checksum algorithms: comma list of none | sha256 | sha512 | md5.'
    default: 'sha256'
  windows-metadata-file:
    description: 'Path to a JSON file with any subset of the Windows metadata fields.'
  windows-icon:
    description: 'Newline- or comma-separated list of <id>=<path> icon entries, or just <path> for id 1.'
  windows-product-name:
    description: 'ProductName string.'
  windows-product-version:
    description: 'ProductVersion (auto-padded to four parts).'
  windows-file-version:
    description: 'FileVersion (auto-padded to four parts).'
  windows-file-description:
    description: 'FileDescription string.'
  windows-company-name:
    description: 'CompanyName string.'
  windows-legal-copyright:
    description: 'LegalCopyright string (© auto-inserted if omitted).'
  windows-original-filename:
    description: 'OriginalFilename string. Defaults to the output basename.'
  windows-internal-name:
    description: 'InternalName string.'
  windows-comments:
    description: 'Comments string.'
  windows-manifest:
    description: 'Path to a raw app.manifest file to embed as RT_MANIFEST.'
  windows-lang:
    description: 'Language identifier for VersionInfo.'
    default: '1033'
  windows-codepage:
    description: 'Codepage for VersionInfo strings.'
    default: '1200'
  macos-sign-identity:
    description: 'codesign identity (Common Name or SHA-1).'
  macos-sign-certificate:
    description: 'Base64-encoded .p12 certificate.'
  macos-keychain-password:
    description: 'Password for the ephemeral keychain holding the signing identity.'
  macos-entitlements:
    description: 'Path to an entitlements plist.'
  macos-notarize:
    description: 'Run xcrun notarytool + staple after signing.'
    default: 'false'
  macos-apple-id:
    description: 'Apple ID for notarytool.'
  macos-team-id:
    description: 'Apple Team ID for notarytool.'
  macos-app-password:
    description: 'App-specific password for notarytool.'
  windows-sign-mode:
    description: 'none | signtool | trusted-signing.'
    default: 'none'
  windows-sign-cert:
    description: 'Base64-encoded .pfx for signtool mode.'
  windows-sign-password:
    description: 'Password for the .pfx.'
  windows-sign-rfc3161-url:
    description: 'RFC3161 timestamp URL for signtool.'
    default: 'http://timestamp.digicert.com'
  windows-sign-description:
    description: 'Description passed to signtool /d.'
  azure-tenant-id:
    description: 'Azure Trusted Signing: tenant ID.'
  azure-client-id:
    description: 'Azure Trusted Signing: client ID.'
  azure-client-secret:
    description: 'Azure Trusted Signing: client secret.'
  azure-endpoint:
    description: 'Azure Trusted Signing: endpoint URL.'
  azure-cert-profile:
    description: 'Azure Trusted Signing: certificate profile name.'
  upload-artifact:
    description: 'Upload each produced file as a workflow artifact.'
    default: 'true'
  artifact-name:
    description: 'Artifact name template. Must be unique per target (@actions/artifact v2 rejects collisions).'
    default: '{name}-{version}-{target}'
  attach-to-release:
    description: 'Attach artifacts to the release matching the triggering tag.'
    default: 'false'
  release-tag:
    description: 'Override the release tag. Required for non-tag triggers when attach-to-release is true.'
  release-name:
    description: 'Release title (optional override).'
  release-body:
    description: 'Release body (optional override).'
  release-draft:
    description: 'Mark the release as draft.'
    default: 'false'
  release-prerelease:
    description: 'Mark the release as prerelease.'
    default: 'false'
  generate-release-table:
    description: 'Append a markdown table of binaries + sizes + checksums to the release body.'
    default: 'true'
  cache:
    description: 'Cache the pkg-fetch Node downloads between runs.'
    default: 'true'
  cache-key:
    description: 'Override the auto-derived cache key.'
  step-summary:
    description: 'Write a markdown summary of build time / size / checksum to the job summary.'
    default: 'true'
  sbom:
    description: 'SBOM format: none | cyclonedx | spdx. (Stretch — deferred to v1.x.)'
    default: 'none'
  provenance:
    description: 'Emit SLSA provenance attestation via actions/attest-build-provenance.'
    default: 'false'

outputs:
  binaries:
    description: 'JSON array of pre-archive binary absolute paths.'
    value: ${{ steps.pkg-action-build.outputs.binaries }}
  artifacts:
    description: 'JSON array of post-archive artifact absolute paths.'
    value: ${{ steps.pkg-action-build.outputs.artifacts }}
  checksums:
    description: 'JSON array of absolute paths to SHASUMS*.txt files.'
    value: ${{ steps.pkg-action-build.outputs.checksums }}
  version:
    description: 'Resolved package.json version used in filename templates.'
    value: ${{ steps.pkg-action-build.outputs.version }}
  release-url:
    description: 'Absolute URL to the GitHub release the action attached to. Empty when attach-to-release=false.'
    value: ${{ steps.pkg-action-build.outputs.release-url }}

runs:
  using: 'composite'
  steps:
    - name: Export PKG_CACHE_PATH
      shell: bash
      run: |
        echo "PKG_CACHE_PATH=${RUNNER_TEMP}/pkg-cache" >> "${GITHUB_ENV}"

    - name: Cache pkg-fetch Node downloads
      if: ${{ inputs.cache != 'false' }}
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/pkg-cache
        key: ${{ inputs.cache-key || format('pkg-fetch-{0}-{1}-node{2}-{3}', runner.os, runner.arch, inputs.node-version, hashFiles('**/package.json', '.pkgrc*', '**/pkg.config.{js,ts,json}')) }}

    - name: Install @yao-pkg/pkg
      if: ${{ inputs.pkg-path == '' }}
      shell: bash
      run: |
        npm i -g @yao-pkg/pkg@${{ inputs.pkg-version }}

    - name: Run pkg-action build
      id: pkg-action-build
      uses: ./packages/build
      with:
          config: ${{ inputs.config }}
          entry: ${{ inputs.entry }}
          targets: ${{ inputs.targets }}
          mode: ${{ inputs.mode }}
          node-version: ${{ inputs.node-version }}
          compress-node: ${{ inputs.compress-node }}
          fallback-to-source: ${{ inputs.fallback-to-source }}
          public: ${{ inputs.public }}
          public-packages: ${{ inputs.public-packages }}
          options: ${{ inputs.options }}
          no-bytecode: ${{ inputs.no-bytecode }}
          no-dict: ${{ inputs.no-dict }}
          debug: ${{ inputs.debug }}
          extra-args: ${{ inputs.extra-args }}
          pkg-version: ${{ inputs.pkg-version }}
          pkg-path: ${{ inputs.pkg-path }}
          strip: ${{ inputs.strip }}
          compress: ${{ inputs.compress }}
          filename: ${{ inputs.filename }}
          checksum: ${{ inputs.checksum }}
          windows-metadata-file: ${{ inputs.windows-metadata-file }}
          windows-icon: ${{ inputs.windows-icon }}
          windows-product-name: ${{ inputs.windows-product-name }}
          windows-product-version: ${{ inputs.windows-product-version }}
          windows-file-version: ${{ inputs.windows-file-version }}
          windows-file-description: ${{ inputs.windows-file-description }}
          windows-company-name: ${{ inputs.windows-company-name }}
          windows-legal-copyright: ${{ inputs.windows-legal-copyright }}
          windows-original-filename: ${{ inputs.windows-original-filename }}
          windows-internal-name: ${{ inputs.windows-internal-name }}
          windows-comments: ${{ inputs.windows-comments }}
          windows-manifest: ${{ inputs.windows-manifest }}
          windows-lang: ${{ inputs.windows-lang }}
          windows-codepage: ${{ inputs.windows-codepage }}
          macos-sign-identity: ${{ inputs.macos-sign-identity }}
          macos-sign-certificate: ${{ inputs.macos-sign-certificate }}
          macos-keychain-password: ${{ inputs.macos-keychain-password }}
          macos-entitlements: ${{ inputs.macos-entitlements }}
          macos-notarize: ${{ inputs.macos-notarize }}
          macos-apple-id: ${{ inputs.macos-apple-id }}
          macos-team-id: ${{ inputs.macos-team-id }}
          macos-app-password: ${{ inputs.macos-app-password }}
          windows-sign-mode: ${{ inputs.windows-sign-mode }}
          windows-sign-cert: ${{ inputs.windows-sign-cert }}
          windows-sign-password: ${{ inputs.windows-sign-password }}
          windows-sign-rfc3161-url: ${{ inputs.windows-sign-rfc3161-url }}
          windows-sign-description: ${{ inputs.windows-sign-description }}
          azure-tenant-id: ${{ inputs.azure-tenant-id }}
          azure-client-id: ${{ inputs.azure-client-id }}
          azure-client-secret: ${{ inputs.azure-client-secret }}
          azure-endpoint: ${{ inputs.azure-endpoint }}
          azure-cert-profile: ${{ inputs.azure-cert-profile }}
          upload-artifact: ${{ inputs.upload-artifact }}
          artifact-name: ${{ inputs.artifact-name }}
          attach-to-release: ${{ inputs.attach-to-release }}
          release-tag: ${{ inputs.release-tag }}
          release-name: ${{ inputs.release-name }}
          release-body: ${{ inputs.release-body }}
          release-draft: ${{ inputs.release-draft }}
          release-prerelease: ${{ inputs.release-prerelease }}
          generate-release-table: ${{ inputs.generate-release-table }}
          cache: ${{ inputs.cache }}
          cache-key: ${{ inputs.cache-key }}
          step-summary: ${{ inputs.step-summary }}
          sbom: ${{ inputs.sbom }}
          provenance: ${{ inputs.provenance }}
